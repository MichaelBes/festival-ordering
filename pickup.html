<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Pickup — St. George Festival</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="style.css">
</head>
<body class="pickup">
  <div class="glow-bar"></div>
  <div class="topbar">
    <h1>Order Pickup</h1>
    <div class="subtitle">Look for your name or order number · tap once handed to a guest</div>
  </div>

  <div class="pickup-list" id="pickupList"></div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    let ordersState = [];

    const STATUS_LABEL = {
      received: 'Received',
      in_progress: 'In Progress',
      ready: 'Ready',
    };

    function rowHtml(o) {
      return `
        <div class="pickup-row" data-id="${o.orderId}" data-status="${o.status}">
          <div class="pickup-row-left">
            <span class="pickup-order-id">${o.orderId}</span>
            <span class="pickup-name">${o.customerName || ''}</span>
          </div>
          <span class="status-pill ${o.status}">${STATUS_LABEL[o.status] || o.status}</span>
        </div>
      `;
    }

    function render() {
      const active = ordersState
        .filter(o => ['received', 'in_progress', 'ready'].includes(o.status))
        .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

      const listEl = document.getElementById('pickupList');
      listEl.innerHTML = active.length
        ? active.map(rowHtml).join('')
        : '<div class="empty-state">No active orders right now</div>';
    }

    async function refresh() {
      try {
        const data = await fetchOrders('');
        ordersState = data.orders;
        render();
      } catch (err) {
        console.error('Refresh failed', err);
      }
    }

    // Tap a "ready" row to mark it picked up — removes instantly,
    // syncs with the server in the background.
    document.getElementById('pickupList').addEventListener('click', async (e) => {
      const row = e.target.closest('.pickup-row');
      if (!row || row.dataset.status !== 'ready') return;
      const orderId = row.dataset.id;

      row.classList.add('removing');
      ordersState = ordersState.filter(o => o.orderId !== orderId);
      setTimeout(render, 150);

      try {
        await updateOrderStatus(orderId, 'completed');
      } catch (err) {
        refresh(); // bring it back if the update failed
      }
    });

    refresh();
    setInterval(refresh, POLL_INTERVAL_MS);
  </script>
</body>
</html>
