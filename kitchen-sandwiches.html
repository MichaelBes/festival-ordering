<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sandwich Kitchen — St. George Festival</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="style.css">
</head>
<body class="kitchen">
  <div class="glow-bar"></div>
  <div class="topbar">
    <h1>Sandwich Kitchen</h1>
    <div class="subtitle" id="clock"></div>
  </div>

  <div class="board">
    <div class="col-heading">To Prepare <span class="count" id="queueCount">0</span></div>
    <div id="queueList"></div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    const KITCHEN_AREA = "sandwich"; // this file is the Sandwich Kitchen screen

    let ordersState = [];
    let pendingStarts = new Set(); // orderIds being started but not yet confirmed
    let knownOrderIds = new Set();
    let firstLoad = true;

    // Simple synthesized beep — no audio file needed.
    // iOS requires a user tap before any sound can play, so the
    // first tap anywhere on the screen "unlocks" audio.
    let audioCtx = null;
    document.body.addEventListener('click', () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }, { once: true });

    function playChime() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = 880;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    }

    function timeAgo(ts) {
      const mins = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
      if (mins < 1) return 'just now';
      return mins + ' min ago';
    }

    function orderCardHtml(o) {
      // Only show the items that belong to THIS kitchen — the other
      // kitchen's items (if any) are that screen's concern, not ours.
      const myItems = (o.items || []).filter(i => i.kitchen === KITCHEN_AREA);
      return `
        <div class="order-card status-received" data-id="${o.orderId}">
          <div class="order-card-top">
            <span>
              ${o.customerName ? `<span class="order-name">${o.customerName}</span>` : ''}
              <span class="order-id">${o.orderId}</span>
              ${o.paymentMethod === 'cash' ? '<span class="order-tag">CASH</span>' : ''}
            </span>
            <span class="order-elapsed">${timeAgo(o.timestamp)}</span>
          </div>
          <ul class="order-items-list">
            ${myItems.map(i => `<li>${i.qty}× ${i.name}</li>`).join('')}
          </ul>
          <div class="order-actions">
            <button class="btn-start" data-id="${o.orderId}">Start Order</button>
          </div>
        </div>
      `;
    }

    function render() {
      const queue = ordersState.filter(o =>
        (KITCHEN_AREA === 'main' ? o.needsMain && !o.mainStarted : o.needsSandwich && !o.sandwichStarted)
      );
      document.getElementById('queueCount').textContent = queue.length;
      document.getElementById('queueList').innerHTML = queue.length
        ? queue.map(orderCardHtml).join('')
        : '<div class="empty-state">Nothing to prepare right now</div>';
    }

    async function refresh() {
      try {
        const data = await fetchOrders('');
        const currentIds = new Set(data.orders.map(o => o.orderId));
        if (!firstLoad) {
          const isNew = [...currentIds].some(id => !knownOrderIds.has(id));
          if (isNew) playChime();
        }
        knownOrderIds = currentIds;
        firstLoad = false;

        // Don't let a background refresh bring back an order we just
        // started, before that change has saved to the Sheet.
        ordersState = data.orders.filter(o => !pendingStarts.has(o.orderId));
        render();
      } catch (err) {
        console.error('Refresh failed', err);
      }
    }

    document.getElementById('queueList').addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-id]');
      if (!btn) return;
      const orderId = btn.dataset.id;

      pendingStarts.add(orderId);
      ordersState = ordersState.filter(o => o.orderId !== orderId);
      render();

      try {
        await startOrderPortion(orderId, KITCHEN_AREA);
        pendingStarts.delete(orderId);
      } catch (err) {
        pendingStarts.delete(orderId);
        refresh(); // bring it back if the update failed
        alert('Could not start that order — please try again.');
      }
    });

    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    updateClock();
    setInterval(updateClock, 30000);
    refresh();
    setInterval(refresh, POLL_INTERVAL_MS);
  </script>
</body>
</html>
