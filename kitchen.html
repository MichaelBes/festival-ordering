<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kitchen — St. George Festival</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="style.css">
</head>
<body class="kitchen">
  <div class="glow-bar"></div>
  <div class="topbar">
    <h1>Kitchen</h1>
    <div class="subtitle" id="clock"></div>
  </div>

  <div class="board">
    <div class="columns">
      <div>
        <div class="col-heading">Received <span class="count" id="receivedCount">0</span></div>
        <div id="receivedList"></div>
      </div>
      <div>
        <div class="col-heading">In Progress <span class="count" id="progressCount">0</span></div>
        <div id="progressList"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    let ordersState = [];
    let pendingUpdates = {}; // orderId -> status we've optimistically set but not yet confirmed
    let knownOrderIds = new Set();
    let firstLoad = true;

    // Simple synthesized beep — no audio file needed.
    // iOS requires a user tap before any sound can play, so the
    // first tap anywhere on the kitchen screen "unlocks" audio.
    let audioCtx = null;
    document.body.addEventListener('click', () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }, { once: true });

    function playChime() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = 880;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    }

    function timeAgo(ts) {
      const mins = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
      if (mins < 1) return 'just now';
      return mins + ' min ago';
    }

    function orderCardHtml(o, actionType) {
      const items = Array.isArray(o.items) ? o.items : [];
      return `
        <div class="order-card status-${o.status}" data-id="${o.orderId}">
          <div class="order-card-top">
            <span>
              ${o.customerName ? `<span class="order-name">${o.customerName}</span>` : ''}
              <span class="order-id">${o.orderId}</span>
              ${o.paymentMethod === 'cash' ? '<span class="order-tag">CASH</span>' : ''}
            </span>
            <span class="order-elapsed">${timeAgo(o.timestamp)}</span>
          </div>
          <ul class="order-items-list">
            ${items.map(i => `<li>${i.qty}× ${i.name}</li>`).join('')}
          </ul>
          <div class="order-actions">
            ${actionType === 'start'
              ? `<button class="btn-start" data-id="${o.orderId}" data-next="in_progress">Start Cooking</button>`
              : `<button class="btn-ready" data-id="${o.orderId}" data-next="ready">Mark Ready</button>`
            }
          </div>
        </div>
      `;
    }

    function render() {
      const received = ordersState.filter(o => o.status === 'received');
      const inProgress = ordersState.filter(o => o.status === 'in_progress');

      document.getElementById('receivedCount').textContent = received.length;
      document.getElementById('progressCount').textContent = inProgress.length;

      document.getElementById('receivedList').innerHTML = received.length
        ? received.map(o => orderCardHtml(o, 'start')).join('')
        : '<div class="empty-state">Nothing here</div>';

      document.getElementById('progressList').innerHTML = inProgress.length
        ? inProgress.map(o => orderCardHtml(o, 'ready')).join('')
        : '<div class="empty-state">Nothing here</div>';
    }

    async function refresh() {
      try {
        const data = await fetchOrders('');
        const currentIds = new Set(data.orders.map(o => o.orderId));
        if (!firstLoad) {
          const isNew = [...currentIds].some(id => !knownOrderIds.has(id));
          if (isNew) playChime();
        }
        knownOrderIds = currentIds;
        firstLoad = false;

        ordersState = data.orders;
        // A background refresh might land while a status change we
        // just made hasn't been saved to the Sheet yet — keep showing
        // our version for those orders until the change is confirmed.
        ordersState.forEach(o => {
          if (pendingUpdates[o.orderId]) o.status = pendingUpdates[o.orderId];
        });
        render();
      } catch (err) {
        console.error('Refresh failed', err);
      }
    }

    // Optimistic update: move the card instantly, sync with the
    // server in the background, and only revert + warn if it fails.
    document.querySelector('.board').addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-id]');
      if (!btn) return;
      const orderId = btn.dataset.id;
      const nextStatus = btn.dataset.next;
      const order = ordersState.find(o => o.orderId === orderId);
      if (!order) return;

      const previousStatus = order.status;
      pendingUpdates[orderId] = nextStatus;
      order.status = nextStatus; // optimistic — updates instantly
      render();

      try {
        await updateOrderStatus(orderId, nextStatus);
        delete pendingUpdates[orderId]; // confirmed — safe for refreshes to take over again
      } catch (err) {
        delete pendingUpdates[orderId];
        order.status = previousStatus; // revert on failure
        render();
        alert('Could not update that order — please try again.');
      }
    });

    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    updateClock();
    setInterval(updateClock, 30000);
    refresh();
    setInterval(refresh, POLL_INTERVAL_MS);
  </script>
</body>
</html>
