<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assembly — St. George Festival</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="stylesheet" href="style.css">
</head>
<body class="kitchen">
  <div class="glow-bar"></div>
  <div class="topbar">
    <h1>Assembly</h1>
    <div class="subtitle" id="clock"></div>
  </div>

  <div class="board">
    <div class="col-heading">Put Together <span class="count" id="queueCount">0</span></div>
    <div id="queueList"></div>
  </div>

  <script src="config.js"></script>
  <script src="api.js"></script>
  <script>
    let ordersState = [];
    let pendingUpdates = {}; // orderId -> status we've optimistically set but not yet confirmed
    let knownOrderIds = new Set();
    let firstLoad = true;

    let audioCtx = null;
    document.body.addEventListener('click', () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }, { once: true });

    function playChime() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.frequency.value = 880;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    }

    function timeAgo(ts) {
      const mins = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
      if (mins < 1) return 'just now';
      return mins + ' min ago';
    }

    function orderCardHtml(o) {
      // Full order — every item, from both kitchens — so whoever's
      // assembling it can see the whole picture.
      const items = o.items || [];
      return `
        <div class="order-card status-in_progress" data-id="${o.orderId}">
          <div class="order-card-top">
            <span>
              ${o.customerName ? `<span class="order-name">${o.customerName}</span>` : ''}
              <span class="order-id">${o.orderId}</span>
              ${o.paymentMethod === 'cash' ? '<span class="order-tag">CASH</span>' : ''}
            </span>
            <span class="order-elapsed">${timeAgo(o.timestamp)}</span>
          </div>
          <ul class="order-items-list">
            ${items.map(i => `<li>${i.qty}× ${i.name} <span class="history-meta">(${i.kitchen})</span></li>`).join('')}
          </ul>
          <div class="order-actions">
            <button class="btn-ready" data-id="${o.orderId}">Mark Ready</button>
          </div>
        </div>
      `;
    }

    function render() {
      const queue = ordersState.filter(o => o.status === 'in_progress');
      document.getElementById('queueCount').textContent = queue.length;
      document.getElementById('queueList').innerHTML = queue.length
        ? queue.map(orderCardHtml).join('')
        : '<div class="empty-state">Nothing waiting on assembly</div>';
    }

    async function refresh() {
      try {
        const data = await fetchOrders('');
        const currentIds = new Set(data.orders.map(o => o.orderId));
        if (!firstLoad) {
          const isNew = [...currentIds].some(id => !knownOrderIds.has(id));
          if (isNew) playChime();
        }
        knownOrderIds = currentIds;
        firstLoad = false;

        ordersState = data.orders;
        ordersState.forEach(o => {
          if (pendingUpdates[o.orderId]) o.status = pendingUpdates[o.orderId];
        });
        render();
      } catch (err) {
        console.error('Refresh failed', err);
      }
    }

    document.getElementById('queueList').addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-id]');
      if (!btn) return;
      const orderId = btn.dataset.id;
      const order = ordersState.find(o => o.orderId === orderId);
      if (!order) return;

      pendingUpdates[orderId] = 'ready';
      order.status = 'ready';
      render();

      try {
        await updateOrderStatus(orderId, 'ready');
        delete pendingUpdates[orderId];
      } catch (err) {
        delete pendingUpdates[orderId];
        order.status = 'in_progress';
        render();
        alert('Could not mark that order ready — please try again.');
      }
    });

    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    updateClock();
    setInterval(updateClock, 30000);
    refresh();
    setInterval(refresh, POLL_INTERVAL_MS);
  </script>
</body>
</html>
